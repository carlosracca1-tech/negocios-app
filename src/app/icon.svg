<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo redondeado para que el ícono se vea bien en pestañas claras y oscuras -->
  <rect width="64" height="64" rx="13" fill="#0a1525"/>
  <!-- N (azul) -->
  <g stroke="#38bdf8" stroke-width="9" stroke-linecap="square" fill="none">
    <line x1="13" y1="14" x2="13" y2="50" />
    <line x1="13" y1="14" x2="38" y2="50" />
    <line x1="38" y1="14" x2="38" y2="50" />
  </g>
  <!-- $ (dorado) superpuesto -->
  <g stroke="#E8B547" stroke-linecap="round" fill="none">
    <line x1="42" y1="10" x2="42" y2="54" stroke-width="4" />
    <path d="M 54 23 Q 54 18 49 18 L 38 18 Q 33 18 33 23 Q 33 28 38 30 L 49 37 Q 54 39 54 44 Q 54 49 49 49 L 38 49 Q 33 49 33 44"
          stroke-width="5" />
  </g>
</svg>
